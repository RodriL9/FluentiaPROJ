server.port=8080
server.servlet.context-path=/api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fluentia_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:rodrigo}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.main.banner-mode=off

# Swagger UI: http://localhost:8080/api/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.show-actuator=false

# Public URLs (also set via backend/.env — DotEnvLoader loads into system properties)
fluentia.app.frontend-public-url=${APP_PUBLIC_URL:http://localhost:5173}
fluentia.app.api-public-base-url=${APP_PUBLIC_API_BASE_URL:http://localhost:8080/api}
# Sign-in with Google: Web client ID (must match Google Cloud OAuth client & frontend)
# GOOGLE_WEB_CLIENT_ID or GOOGLE_CLIENT_ID (many Google samples use the latter)
fluentia.google.web-client-id=${GOOGLE_WEB_CLIENT_ID:${GOOGLE_CLIENT_ID:}}
# Gmail API (send verification mail) — OAuth client + refresh token with gmail.send scope
fluentia.google.gmail-client-id=${GMAIL_OAUTH_CLIENT_ID:${GOOGLE_WEB_CLIENT_ID:${GOOGLE_CLIENT_ID:}}}
fluentia.google.gmail-client-secret=${GMAIL_OAUTH_CLIENT_SECRET:${GOOGLE_OAUTH_CLIENT_SECRET:${GOOGLE_CLIENT_SECRET:}}}
fluentia.google.gmail-refresh-token=${GMAIL_OAUTH_REFRESH_TOKEN:${GOOGLE_REFRESH_TOKEN:}}
fluentia.google.gmail-from-email=${GMAIL_FROM_EMAIL:}
# Dev: set true if Gmail is not configured (users are created as verified)
fluentia.app.skip-email-verification=${SKIP_EMAIL_VERIFICATION:false}
